<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calls - The Web Conference 2026</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/tab-menu.css">
    <link rel="stylesheet" href="css/dropdown-menu.css">
    <link rel="stylesheet" href="css/header-layout.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
        <!-- Header will be loaded here by JavaScript -->
    <div id="header-placeholder"></div>


    <div class="page-header">
        <div class="container">
            <h1>Calls for Submissions</h1>
        </div>
    </div>

    <div class="page-content">
        <div class="container">
            <section class="call-section">
                <h2>Call for Papers</h2>
                <ul class="important-dates-list" id="research-track-dates">
                    <!-- Dates will be loaded dynamically from data/important-dates.json -->
                    <li><strong>Abstract deadline:</strong> <span data-date="research_track.abstract_deadline">September 30, 2025</span></li>
                    <li><strong>Full paper deadline:</strong> <span data-date="research_track.full_paper_deadline">October 7, 2025</span></li>
                    <li><strong>Rebuttal period:</strong> <span data-date="research_track.rebuttal_period">November 24 – December 1, 2025</span></li>
                    <li><strong>Notification of acceptance:</strong> <span data-date="research_track.notification">January 13, 2026</span></li>
                    <li><strong>Camera ready:</strong> <span data-date="research_track.camera_ready">January 25, 2026</span></li>
                    <li><strong>Conference:</strong> <span data-date="conference.start">April 13</span> – <span data-date="conference.end">17, 2026</span></li>
                </ul>
            </section>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="js/main.js"></script>

    <script src="js/header-loader.js"></script>
    <script src="js/dates-loader.js"></script>
    <script src="js/footer-loader.js"></script>
    </body>
</html>
